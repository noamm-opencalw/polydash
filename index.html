<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PolyDash — לוח מסחר</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.48.0/dist/apexcharts.min.js"></script>

  <style>
    :root {
      --bg-base:        #0a0e17;
      --bg-panel:       #0f1520;
      --bg-card:        #131b28;
      --bg-row:         #111827;
      --bg-row-hover:   #1a2535;
      --border:         rgba(255,255,255,0.07);
      --border-strong:  rgba(255,255,255,0.14);
      --accent:         #00c4b4;
      --accent-dim:     rgba(0,196,180,0.12);
      --accent-border:  rgba(0,196,180,0.35);
      --up:             #00c087;
      --up-bg:          rgba(0,192,135,0.10);
      --up-border:      rgba(0,192,135,0.30);
      --down:           #ef4444;
      --down-bg:        rgba(239,68,68,0.10);
      --down-border:    rgba(239,68,68,0.28);
      --warn:           #f59e0b;
      --neutral:        #6b7a99;
      --t1: #e8edf5;
      --t2: #8fa3c0;
      --t3: #4d607d;
      --t4: #2d3a50;
      --mono: 'IBM Plex Mono', monospace;
      --gap-xs: 4px; --gap-sm: 8px; --gap-md: 14px; --gap-lg: 20px; --gap-xl: 28px;
      --r-xs: 4px; --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-pill: 100px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Assistant', -apple-system, sans-serif;
      background: var(--bg-base);
      color: var(--t1);
      min-height: 100vh;
      direction: rtl;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(66px + env(safe-area-inset-bottom));
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(0,196,180,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,196,180,0.015) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    main, header, nav { position: relative; z-index: 1; }

    /* ══ TICKER ══ */
    .ticker-bar {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      height: 30px; overflow: hidden;
      display: flex; align-items: center;
      padding-top: env(safe-area-inset-top);
    }
    .ticker-track {
      display: flex; gap: 0; white-space: nowrap;
      animation: ticker-scroll 40s linear infinite;
    }
    .ticker-track:hover { animation-play-state: paused; }
    @keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .ticker-item {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 0 14px; font-size: 11px; font-family: var(--mono);
      border-right: 1px solid var(--border);
    }
    .ticker-name  { color: var(--t3); }
    .ticker-price { color: var(--t1); font-weight: 600; }
    .ticker-up    { color: var(--up); }
    .ticker-down  { color: var(--down); }

    /* ══ HEADER ══ */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,14,23,0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-strong);
    }
    .header-inner {
      max-width: 600px; margin: 0 auto;
      padding: 10px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .logo { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .logo-mark {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--accent), #0e9f92);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      box-shadow: 0 0 10px rgba(0,196,180,0.3);
    }
    .logo-name { font-size: 15px; font-weight: 800; color: var(--t1); letter-spacing: -0.3px; }
    .logo-sub  { font-size: 9px; color: var(--t3); font-weight: 500; }

    .header-pnl {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 16px;
      border-right: 1px solid var(--border);
      border-left: 1px solid var(--border);
      padding: 0 12px;
    }
    .hpnl-item { text-align: center; }
    .hpnl-val { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--t1); }
    .hpnl-lbl { font-size: 9px; color: var(--t3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; margin-top: 1px; }

    .btn-refresh {
      display: flex; align-items: center; gap: 4px;
      background: transparent;
      border: 1px solid var(--border-strong);
      border-radius: var(--r-sm);
      padding: 5px 9px;
      font-size: 11px; font-weight: 600;
      color: var(--t2); cursor: pointer;
      transition: all 0.15s;
      font-family: 'Assistant', sans-serif;
      flex-shrink: 0;
    }
    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }
    .live-dot {
      width: 6px; height: 6px;
      background: var(--up); border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(1.3); } }

    /* ══ BOTTOM NAV ══ */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      background: rgba(10,14,23,0.98);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border-strong);
      display: flex; align-items: stretch;
      padding-bottom: env(safe-area-inset-bottom);
      height: calc(62px + env(safe-area-inset-bottom));
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px; border: none; background: transparent;
      color: var(--t3); cursor: pointer;
      font-size: 10px; font-weight: 600;
      font-family: 'Assistant', sans-serif;
      padding: 8px 4px; position: relative;
      transition: color 0.15s;
    }
    .nav-item:hover { color: var(--t2); }
    .nav-item.active { color: var(--accent); }
    .nav-item.active::after {
      content: ''; position: absolute; top: 0; left: 20%; right: 20%;
      height: 2px; background: var(--accent);
      border-radius: 0 0 2px 2px;
    }
    .nav-icon { font-size: 17px; line-height: 1; }
    .nav-badge {
      position: absolute; top: 5px; right: calc(50% - 18px);
      background: var(--accent); color: #000;
      border-radius: var(--r-pill); padding: 1px 4px;
      font-size: 9px; font-weight: 800; min-width: 14px;
      text-align: center; display: none;
    }
    .nav-badge.red { background: var(--down); color: white; }

    /* ══ LAYOUT ══ */
    .content {
      max-width: 600px; margin: 0 auto;
      padding: 12px 12px 20px;
    }
    .section { margin-bottom: 20px; }
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .section-title { font-size: 11px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: 0.8px; }
    .section-badge {
      font-size: 10px; color: var(--t3);
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r-pill); padding: 1px 7px; font-family: var(--mono);
    }

    /* ══ PORTFOLIO HERO ══ */
    .hero-card {
      background: linear-gradient(135deg, var(--bg-panel) 0%, rgba(0,196,180,0.04) 100%);
      border: 1px solid var(--accent-border);
      border-radius: var(--r-lg);
      padding: 16px;
      margin-bottom: 12px;
      position: relative; overflow: hidden;
    }
    .hero-card::before {
      content: '';
      position: absolute; top: -20px; left: -20px;
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(0,196,180,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-label { font-size: 10px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
    .hero-pnl {
      font-family: var(--mono); font-size: 36px; font-weight: 800;
      line-height: 1; margin-bottom: 4px;
    }
    .hero-pnl-sub { font-size: 12px; color: var(--t3); margin-bottom: 14px; }

    .hero-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .hstat {
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 8px 6px; text-align: center;
    }
    .hstat-val { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--t1); }
    .hstat-lbl { font-size: 9px; color: var(--t3); font-weight: 600; margin-top: 2px; text-transform: uppercase; }
    .hstat.up   .hstat-val { color: var(--up); }
    .hstat.down .hstat-val { color: var(--down); }
    .hstat.accent .hstat-val { color: var(--accent); }

    /* ══ POLYMARKET LINK ══ */
    .poly-link {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--bg-card);
      border: 1px solid var(--border-strong);
      border-radius: var(--r-md);
      padding: 12px;
      text-decoration: none;
      color: var(--t2);
      font-size: 13px; font-weight: 600;
      transition: all 0.15s;
      margin-bottom: 12px;
    }
    .poly-link:hover { border-color: var(--accent); color: var(--accent); }
    .poly-link-logo { font-size: 18px; }
    .poly-link-arrow { margin-right: auto; font-size: 16px; opacity: 0.5; }

    /* ══ WIN/LOSS STRIP ══ */
    .wl-strip {
      display: grid; grid-template-columns: 1fr 1px 1fr;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      overflow: hidden;
      margin-bottom: 12px;
    }
    .wl-divider { background: var(--border-strong); }
    .wl-side { padding: 12px; text-align: center; }
    .wl-val { font-family: var(--mono); font-size: 22px; font-weight: 800; }
    .wl-sub { font-size: 10px; color: var(--t3); font-weight: 600; margin-top: 3px; }
    .wl-pnl { font-size: 12px; font-family: var(--mono); margin-top: 4px; font-weight: 700; }
    .wl-side.win .wl-val { color: var(--up); }
    .wl-side.loss .wl-val { color: var(--down); }

    /* ══ POSITION CARD ══ */
    .pos-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 12px;
      margin-bottom: 8px;
      transition: all 0.15s;
    }
    .pos-card:hover { border-color: var(--border-strong); background: var(--bg-row-hover); }
    .pos-card-head {
      display: flex; align-items: flex-start; gap: 10px;
      margin-bottom: 10px;
    }
    .pos-card-img {
      width: 36px; height: 36px; border-radius: var(--r-sm);
      object-fit: cover; flex-shrink: 0;
      background: var(--bg-panel);
    }
    .pos-card-title-wrap { flex: 1; min-width: 0; }
    .pos-card-title {
      font-size: 13px; font-weight: 700; color: var(--t1);
      line-height: 1.35; margin-bottom: 5px;
    }
    .pos-card-badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }

    .badge {
      display: inline-flex; align-items: center;
      border-radius: var(--r-xs); padding: 2px 6px;
      font-size: 10px; font-weight: 700;
    }
    .badge-yes  { background: var(--up-bg);   border: 1px solid var(--up-border);   color: var(--up);   }
    .badge-no   { background: var(--down-bg);  border: 1px solid var(--down-border);  color: var(--down); }
    .badge-days { background: var(--bg-panel); border: 1px solid var(--border);       color: var(--t3);   }
    .badge-win  { background: var(--up-bg);   border: 1px solid var(--up-border);   color: var(--up);   }
    .badge-loss { background: var(--down-bg);  border: 1px solid var(--down-border);  color: var(--down); }
    .badge-open { background: rgba(0,196,180,0.1); border: 1px solid var(--accent-border); color: var(--accent); }
    .badge-neutral { background: var(--bg-panel); border: 1px solid var(--border); color: var(--t3); }

    .pos-card-metrics {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }
    .pos-metric {
      background: rgba(0,0,0,0.2);
      border-radius: var(--r-xs);
      padding: 7px 8px; text-align: center;
    }
    .pos-metric-val { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--t1); }
    .pos-metric-lbl { font-size: 9px; color: var(--t3); font-weight: 600; text-transform: uppercase; margin-top: 2px; }
    .pos-metric.up   .pos-metric-val { color: var(--up); }
    .pos-metric.down .pos-metric-val { color: var(--down); }

    .pos-progress { height: 3px; border-radius: 2px; background: var(--border-strong); overflow: hidden; margin-top: 8px; }
    .pos-progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

    .pos-card-actions { display: flex; gap: 6px; margin-top: 10px; }
    .btn-sm {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 4px;
      padding: 7px 10px; border-radius: var(--r-sm);
      font-size: 11px; font-weight: 700;
      font-family: 'Assistant', sans-serif;
      cursor: pointer; text-decoration: none;
      border: none; transition: all 0.15s;
    }
    .btn-sm-primary { background: var(--accent); color: #000; }
    .btn-sm-primary:hover { opacity: 0.85; }
    .btn-sm-ghost  { background: var(--bg-panel); border: 1px solid var(--border); color: var(--t2); }
    .btn-sm-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm-danger { background: var(--down-bg); border: 1px solid var(--down-border); color: var(--down); }

    /* ══ HISTORY ITEM ══ */
    .hist-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 12px;
      margin-bottom: 8px;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .hist-icon { font-size: 22px; flex-shrink: 0; margin-top: 2px; }
    .hist-body { flex: 1; min-width: 0; }
    .hist-title { font-size: 13px; font-weight: 600; color: var(--t1); line-height: 1.35; margin-bottom: 4px; }
    .hist-meta  { font-size: 11px; color: var(--t3); display: flex; gap: 8px; flex-wrap: wrap; }
    .hist-right { text-align: left; flex-shrink: 0; }
    .hist-pnl { font-family: var(--mono); font-size: 16px; font-weight: 800; }
    .hist-pnl.up   { color: var(--up); }
    .hist-pnl.down { color: var(--down); }
    .hist-pct { font-size: 10px; color: var(--t3); margin-top: 2px; font-family: var(--mono); }

    /* ══ INSIGHT CARD ══ */
    .insight-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-bottom: 12px;
    }
    .insight-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 12px;
    }
    .insight-card.full { grid-column: 1 / -1; }
    .insight-label { font-size: 10px; color: var(--t3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
    .insight-val   { font-family: var(--mono); font-size: 24px; font-weight: 800; color: var(--t1); line-height: 1.1; }
    .insight-sub   { font-size: 11px; color: var(--t3); margin-top: 4px; }
    .insight-val.up   { color: var(--up); }
    .insight-val.down { color: var(--down); }
    .insight-val.accent { color: var(--accent); }

    /* Win rate bar */
    .winrate-bar {
      height: 6px; border-radius: var(--r-pill);
      background: var(--border-strong); overflow: hidden; margin-top: 8px;
    }
    .winrate-fill { height: 100%; border-radius: var(--r-pill); background: var(--up); transition: width 0.5s; }

    /* ══ CHART CONTAINER ══ */
    .chart-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 14px;
      margin-bottom: 12px;
    }
    .chart-title { font-size: 12px; font-weight: 700; color: var(--t2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    .chart-wrap  { min-height: 200px; }

    /* ══ SKELETON ══ */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position:  600px 0; }
    }
    .skel {
      background: linear-gradient(90deg, var(--bg-panel) 25%, rgba(255,255,255,0.05) 50%, var(--bg-panel) 75%);
      background-size: 1200px 100%;
      animation: shimmer 1.8s infinite linear;
      border-radius: var(--r-md);
    }

    /* ══ EMPTY STATE ══ */
    .empty-state {
      text-align: center; padding: 40px 16px;
      color: var(--t3);
    }
    .empty-icon { font-size: 40px; display: block; margin-bottom: 10px; opacity: 0.4; }
    .empty-text { font-size: 13px; line-height: 1.6; }

    /* ══ UPDATE TIME ══ */
    .update-pill {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; color: var(--t3);
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r-pill); padding: 3px 10px;
      margin-bottom: 10px; width: fit-content;
    }

    /* ══ APEXCHARTS OVERRIDE ══ */
    .apexcharts-tooltip { background: var(--bg-panel) !important; border-color: var(--border-strong) !important; color: var(--t1) !important; }
    .apexcharts-tooltip-title { background: var(--bg-card) !important; border-bottom-color: var(--border) !important; }
    .apexcharts-legend-text { color: var(--t2) !important; }
    .apexcharts-text { fill: var(--t2) !important; }
  </style>
</head>
<body>

<!-- TICKER -->
<div class="ticker-bar" id="tickerBar">
  <div class="ticker-track" id="tickerTrack">
    <span class="ticker-item"><span class="ticker-name">טוען...</span></span>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-mark">📊</div>
      <div>
        <div class="logo-name">PolyDash</div>
        <div class="logo-sub">שוק הניבויים</div>
      </div>
    </div>

    <div class="header-pnl">
      <div class="hpnl-item">
        <div class="hpnl-val" id="hBalance">—</div>
        <div class="hpnl-lbl">זמין</div>
      </div>
      <div class="hpnl-item">
        <div class="hpnl-val" id="hPnl">—</div>
        <div class="hpnl-lbl">P&L</div>
      </div>
      <div class="hpnl-item">
        <div class="hpnl-val" id="hActive">—</div>
        <div class="hpnl-lbl">פתוחים</div>
      </div>
    </div>

    <button class="btn-refresh" id="refreshBtn">
      <span class="live-dot"></span> LIVE
    </button>
  </div>
</header>

<!-- MAIN -->
<main>
  <div class="content" id="mainContent">
    <div id="skeletonView" style="padding-top:4px">
      <div class="skel" style="height:140px;margin-bottom:10px"></div>
      <div class="skel" style="height:50px;margin-bottom:8px;opacity:.8"></div>
      <div class="skel" style="height:80px;margin-bottom:8px;opacity:.6"></div>
      <div class="skel" style="height:80px;opacity:.4"></div>
    </div>
    <div id="realContent" style="display:none"></div>
  </div>
</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" id="bottomNav">
  <button class="nav-item active" data-view="home" aria-label="ראשי">
    <span class="nav-icon">🏠</span><span>ראשי</span>
  </button>
  <button class="nav-item" data-view="open" aria-label="פתוחים">
    <span class="nav-badge" id="navBadgeOpen"></span>
    <span class="nav-icon">📂</span><span>פתוחים</span>
  </button>
  <button class="nav-item" data-view="history" aria-label="היסטוריה">
    <span class="nav-badge red" id="navBadgeHist"></span>
    <span class="nav-icon">📜</span><span>היסטוריה</span>
  </button>
  <button class="nav-item" data-view="pnl" aria-label="P&L">
    <span class="nav-icon">📊</span><span>P&L</span>
  </button>
  <button class="nav-item" data-view="insights" aria-label="תובנות">
    <span class="nav-icon">🧠</span><span>תובנות</span>
  </button>
</nav>

<script>
'use strict';

const DATA_URL   = './data.json';
const REFRESH_MS = 5 * 60 * 1000;

let appData    = null;
let activeView = 'home';
let chartInstances = {};

/* ─── utils ─── */
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt$ = n => { if(!n&&n!==0) return '—'; const v=parseFloat(n); if(Math.abs(v)>=1e6) return '$'+(v/1e6).toFixed(1)+'M'; if(Math.abs(v)>=1e3) return '$'+(v/1e3).toFixed(0)+'K'; return '$'+v.toFixed(2); };
const fmtPct = n => (n != null ? parseFloat(n).toFixed(1)+'%' : '—');
const fmtAgo = s => { if(!s) return ''; const diff=Math.round((Date.now()-new Date(s))/60000); if(diff<1) return 'עכשיו'; if(diff<60) return `לפני ${diff}ד'`; return `לפני ${Math.round(diff/60)}ש'`; };
const fmtDate = s => { if(!s) return '—'; const d=new Date(s); const diff=Math.round((d-Date.now())/(1000*60*60*24)); if(diff<0) return 'הסתיים'; if(diff===0) return 'היום'; if(diff===1) return 'מחר'; if(diff<7) return `${diff}d`; if(diff<30) return `${Math.round(diff/7)}w`; return `${Math.round(diff/30)}m`; };
const truncate = (s, n) => s && s.length > n ? s.slice(0,n)+'…' : (s||'');
const destroyChart = id => { if(chartInstances[id]) { try { chartInstances[id].destroy(); } catch(e){} delete chartInstances[id]; } };

/* ─── data ─── */
async function loadData(isRefresh=false) {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    appData = await r.json();
    renderAll();
  } catch(e) {
    console.error('loadData:', e);
  }
}

function renderAll() {
  document.getElementById('skeletonView').style.display = 'none';
  document.getElementById('realContent').style.display  = 'block';
  updateHeader();
  updateTicker();
  updateBadges();
  renderView();
}

/* ─── Header ─── */
function updateHeader() {
  const port = appData?.real_positions?.portfolio || {};
  const pnl  = port.total_pnl || 0;
  const bal  = Math.max(port.usdc_balance||0, 0);
  const act  = port.active || 0;

  const hBal  = document.getElementById('hBalance');
  const hPnl  = document.getElementById('hPnl');
  const hAct  = document.getElementById('hActive');
  if (hBal) hBal.textContent = '$'+bal.toFixed(2);
  if (hAct) hAct.textContent = act;
  if (hPnl) {
    hPnl.textContent = (pnl>=0?'+':'')+fmt$(pnl);
    hPnl.style.color = pnl>=0 ? 'var(--up)' : 'var(--down)';
  }
}

/* ─── Ticker ─── */
function updateTicker() {
  const hot = (appData?.hot || []).slice(0,8);
  if (!hot.length) return;
  const items = hot.map(m => `
    <span class="ticker-item">
      <span class="ticker-name">${esc(truncate(m.question,30))}</span>
      <span class="ticker-price ${m.yes_pct>=50?'ticker-up':'ticker-down'}">${m.yes_pct}%</span>
    </span>`).join('');
  const track = document.getElementById('tickerTrack');
  if (track) track.innerHTML = items + items;
}

/* ─── Badges ─── */
function updateBadges() {
  const rp = appData?.real_positions || {};
  const openN = (rp.active||[]).length;
  const histN = (rp.resolved||[]).length;

  const setB = (id, n, cls='') => {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = n;
    el.style.display = n > 0 ? '' : 'none';
    if (cls) el.className = 'nav-badge ' + cls;
  };
  setB('navBadgeOpen', openN);
  setB('navBadgeHist', histN, 'red');
}

/* ─── Main render ─── */
function renderView() {
  const rc = document.getElementById('realContent');
  if (!appData || !rc) return;

  // Destroy existing charts
  Object.keys(chartInstances).forEach(destroyChart);

  switch (activeView) {
    case 'home':     rc.innerHTML = renderHome();     break;
    case 'open':     rc.innerHTML = renderOpen();     break;
    case 'history':  rc.innerHTML = renderHistory();  break;
    case 'pnl':      rc.innerHTML = renderPnl();      initPnlCharts(); break;
    case 'insights': rc.innerHTML = renderInsights(); break;
    default:         rc.innerHTML = renderHome();
  }
}

        <div class="hstat-lbl">זכיות</div>
      </div>
      <div class="hstat down">
        <div class="hstat-val">${losses}</div>
        <div class="hstat-lbl">הפסדים</div>
      </div>
    </div>
  </div>

  <!-- Win/Loss strip -->
  ${(wins+losses) > 0 ? `
  <div class="wl-strip">
    <div class="wl-side win">
      <div class="wl-val">✅ ${wins}</div>

      <div class="wl-pnl" style="color:var(--up)">Win rate ${winRate}%</div>
    </div>
    <div class="wl-divider"></div>
    <div class="wl-side loss">
      <div class="wl-val">❌ ${losses}</div>
      <div class="wl-sub">הפסדים</div>
      <div class="wl-pnl" style="color:var(--down)">${100-winRate}%</div>

  <!-- Active positions preview -->

  <div class="section">

      <span class="section-title">📂 פוזיציות פתוחות</span>
      <span class="section-badge">${active.length}</span>
    </div>
    ${active.slice(0,2).map(p => renderPosCard(p, true)).join('')}
    ${active.length > 2 ? `<button onclick="switchView('open')" style="width:100%;padding:10px;background:transparent;border:1px dashed var(--border);border-radius:var(--r-md);color:var(--t3);font-size:12px;cursor:pointer;font-family:'Assistant',sans-serif;margin-top:4px">+ עוד ${active.length-2} פוזיציות</button>` : ''}
  </div>` : `
  <div class="empty-state" style="padding:24px 0">

    <div class="empty-text">אין פוזיציות פתוחות<br><small>הבוט יפתח ב-09:00 / 18:00</small></div>

/* ══════════════════════════════════
   VIEW: OPEN POSITIONS
══════════════════════════════════ */
function renderOpen() {
  const rp     = appData?.real_positions || {};
  const active = rp.active || [];
  const port   = rp.portfolio || {};
  const pnl    = port.total_pnl || 0;
  const pnlSign = pnl >= 0 ? '+' : '';

  if (!active.length) {
    return `<div class="empty-state">
      <span class="empty-icon">📂</span>
      <div class="empty-text">אין פוזיציות פתוחות כרגע<br><small>הבוט מריץ סריקה ב-09:00 ו-18:00</small></div>
    </div>`;
  }

  const totalInv = active.reduce((s,p) => s + (p.initialValue||0), 0);
  const totalCur = active.reduce((s,p) => s + (p.currentValue||0), 0);

  return `
  <div class="hero-card" style="padding:12px">
    <div class="hero-stats" style="grid-template-columns:repeat(3,1fr)">
      <div class="hstat">
        <div class="hstat-val">$${totalInv.toFixed(2)}</div>
        <div class="hstat-lbl">הושקע</div>
      </div>
      <div class="hstat">
        <div class="hstat-val">$${totalCur.toFixed(2)}</div>
        <div class="hstat-lbl">שווי</div>
      </div>
      <div class="hstat ${pnl>=0?'up':'down'}">
        <div class="hstat-val">${pnlSign}${fmt$(pnl)}</div>
        <div class="hstat-lbl">P&L</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-head">
      <span class="section-title">פוזיציות פתוחות</span>
      <span class="section-badge">${active.length}</span>
    </div>
    ${active.map(p => renderPosCard(p, false)).join('')}
  </div>
  `;
}

function renderPosCard(pos, compact=false) {
  const pnl      = pos.cashPnl || 0;
  const pnlSign  = pnl >= 0 ? '+' : '';
  const pnlCls   = pnl >= 0 ? 'up' : 'down';
  const pctPnl   = pos.percentPnl || 0;
  const entryPct = Math.round((pos.avgPrice||0)*1000)/10;
  const curPct   = Math.round((pos.curPrice||0)*1000)/10;
  const barColor = pnl >= 0 ? 'var(--up)' : 'var(--down)';
  const noLiq    = (pos.exitValue||0) < 0.10;
  const daysStr  = pos.daysLeft === 0 ? '🔔 היום' : pos.daysLeft === 1 ? '⚡ מחר' : pos.daysLeft != null ? `${pos.daysLeft}d` : fmtDate(pos.endDate);
  const outcomeCls = pos.outcome === 'Yes' ? 'badge-yes' : 'badge-no';

  return `
  <div class="pos-card">
    <div class="pos-card-head">
      ${pos.icon ? `<img src="${esc(pos.icon)}" class="pos-card-img" onerror="this.style.display='none'" loading="lazy">` : ''}
      <div class="pos-card-title-wrap">
        <div class="pos-card-title">${esc(truncate(pos.title, compact?70:100))}</div>
        <div class="pos-card-badges">
          <span class="badge ${outcomeCls}">${pos.outcome}</span>
          <span class="badge badge-days">⏱ ${daysStr}</span>
          ${noLiq ? `<span class="badge badge-neutral">🔒 ללא נזילות</span>` : ''}
        </div>
      </div>
    </div>

    <div class="pos-card-metrics">
      <div class="pos-metric">
        <div class="pos-metric-val">${entryPct}%</div>
        <div class="pos-metric-lbl">כניסה</div>
      </div>
      <div class="pos-metric">
        <div class="pos-metric-val" style="color:${curPct>=entryPct?'var(--up)':'var(--down)'}">${curPct}%</div>
        <div class="pos-metric-lbl">נוכחי</div>
      </div>
      <div class="pos-metric ${pnlCls}">
        <div class="pos-metric-val">${pnlSign}$${Math.abs(pnl).toFixed(2)}</div>
        <div class="pos-metric-lbl">${pnlSign}${pctPnl.toFixed(1)}%</div>
      </div>
    </div>

    <div class="pos-progress">
      <div class="pos-progress-fill" style="width:${Math.min(curPct,100)}%;background:${barColor}"></div>
    </div>

    ${!compact ? `
    <div class="pos-card-actions">
      <a href="${esc(pos.link||'#')}" target="_blank" class="btn-sm btn-sm-primary">🌐 פתח ב-Polymarket</a>
      ${!noLiq ? `<a href="${esc(pos.link||'#')}" target="_blank" class="btn-sm btn-sm-danger">מכור</a>` : ''}
    </div>` : ''}
  </div>`;
}

/* ══════════════════════════════════
   VIEW: HISTORY
══════════════════════════════════ */
function renderHistory() {
  const rp       = appData?.real_positions || {};
  const resolved = rp.resolved || [];
  const port     = rp.portfolio || {};
  const wins     = port.wins || 0;
  const losses   = port.losses || 0;

  if (!resolved.length) {
    return `<div class="empty-state">
      <span class="empty-icon">📜</span>
      <div class="empty-text">אין הימורים סגורים עדיין<br><small>ההיסטוריה תופיע כאן לאחר סיום הימורים</small></div>
    </div>`;
  }

  const totalPnl = resolved.reduce((s,r) => s + (r.cashPnl||0), 0);
  const totalPnlSign = totalPnl >= 0 ? '+' : '';

  return `
  <div class="wl-strip" style="margin-bottom:12px">
    <div class="wl-side win">
      <div class="wl-val">✅ ${wins}</div>
      <div class="wl-sub">זכיות</div>
    </div>
    <div class="wl-divider"></div>
    <div class="wl-side loss">
      <div class="wl-val">❌ ${losses}</div>
      <div class="wl-sub">הפסדים</div>
    </div>
  </div>

  <div class="section">
    <div class="section-head">
      <span class="section-title">היסטוריית הימורים</span>
      <span class="section-badge">${resolved.length} · ${totalPnlSign}${fmt$(totalPnl)}</span>
    </div>
    ${resolved.map(r => renderHistItem(r)).join('')}
  </div>`;
}

function renderHistItem(r) {
  const pnl     = r.cashPnl || 0;
  const pnlSign = pnl >= 0 ? '+' : '';
  const isWin   = r.winner === true || pnl > 0;
  const isLoss  = r.winner === false || pnl < 0;
  const icon    = isWin ? '✅' : isLoss ? '❌' : '⏳';
  const pnlCls  = pnl > 0 ? 'up' : pnl < 0 ? 'down' : '';
  const pct     = r.percentPnl || 0;

  return `
  <div class="hist-item">
    <span class="hist-icon">${icon}</span>
    <div class="hist-body">
      <div class="hist-title">${esc(truncate(r.title, 80))}</div>
      <div class="hist-meta">
        <span class="badge ${r.outcome==='Yes'?'badge-yes':'badge-no'}" style="font-size:9px">${esc(r.outcome||'')}</span>
        <span>${r.endDate ? new Date(r.endDate).toLocaleDateString('he-IL') : '—'}</span>
        <span>${fmt$(r.initialValue||0)} הושקע</span>
      </div>
    </div>
    <div class="hist-right">
      <div class="hist-pnl ${pnlCls}">${pnlSign}${fmt$(pnl)}</div>
      <div class="hist-pct">${pnlSign}${pct.toFixed(1)}%</div>
    </div>
  </div>`;
}

/* ══════════════════════════════════
   VIEW: P&L CHARTS
══════════════════════════════════ */
function renderPnl() {
  const rp      = appData?.real_positions || {};
  const active  = rp.active || [];
  const resolved= rp.resolved || [];
  const port    = rp.portfolio || {};
  const allBets = [...resolved, ...active];

  const pnl       = port.total_pnl || 0;
  const invested  = port.total_invested || 0;
  const pnlSign   = pnl >= 0 ? '+' : '';
  const wins      = port.wins || 0;
  const losses    = port.losses || 0;

  return `
  <div class="hero-card" style="padding:12px;margin-bottom:12px">
    <div class="hero-label">סך P&L</div>
    <div class="hero-pnl" style="color:${pnl>=0?'var(--up)':'var(--down)'};font-size:28px">${pnlSign}${fmt$(pnl)}</div>
    <div class="hero-pnl-sub">מתוך $${invested.toFixed(2)} שהושקעו</div>
  </div>

  <!-- Donut: wins vs losses -->
  <div class="chart-card">
    <div class="chart-title">התפלגות תוצאות</div>
    <div id="chartDonut" class="chart-wrap" style="min-height:220px"></div>
  </div>

  <!-- Bar: P&L per bet -->
  ${allBets.length > 0 ? `
  <div class="chart-card">
    <div class="chart-title">P&L לפי הימור</div>
    <div id="chartBar" class="chart-wrap" style="min-height:${Math.max(allBets.length*44,150)}px"></div>
  </div>` : ''}

  <!-- Individual breakdown -->
  <div class="section">
    <div class="section-head">
      <span class="section-title">פירוט לפי הימור</span>
      <span class="section-badge">${allBets.length}</span>
    </div>
    ${allBets.map(b => {
      const bPnl  = b.cashPnl || 0;
      const bSign = bPnl >= 0 ? '+' : '';
      const bCls  = bPnl > 0 ? 'badge-win' : bPnl < 0 ? 'badge-loss' : 'badge-open';
      const label = b.redeemable === true ? 'ממומש' : (b.endDate && new Date(b.endDate) < new Date()) ? 'סגור' : 'פתוח';
      return `
      <div class="hist-item">
        <span class="hist-icon">${bPnl>0?'✅':bPnl<0?'❌':'🟡'}</span>
        <div class="hist-body">
          <div class="hist-title">${esc(truncate(b.title,70))}</div>
          <div class="hist-meta">
            <span class="badge ${b.outcome==='Yes'?'badge-yes':'badge-no'}" style="font-size:9px">${esc(b.outcome||'')}</span>
            <span class="badge ${bCls}" style="font-size:9px">${label}</span>
            <span>${fmt$(b.initialValue||0)} הושקע</span>
          </div>
        </div>
        <div class="hist-right">
          <div class="hist-pnl ${bPnl>=0?'up':'down'}">${bSign}${fmt$(bPnl)}</div>
          <div class="hist-pct">${Math.round((b.curPrice||0)*100)}% נוכחי</div>
        </div>
      </div>`;
    }).join('')}
  </div>
  `;
}

function initPnlCharts() {
  const rp       = appData?.real_positions || {};
  const active   = rp.active || [];
  const resolved = rp.resolved || [];
  const port     = rp.portfolio || {};
  const allBets  = [...resolved, ...active];
  const wins     = port.wins || 0;
  const losses   = port.losses || 0;

  /* Donut */
  const totalWinPnl  = resolved.filter(r=>(r.cashPnl||0)>0).reduce((s,r)=>s+(r.cashPnl||0),0);
  const totalLossPnl = Math.abs(resolved.filter(r=>(r.cashPnl||0)<0).reduce((s,r)=>s+(r.cashPnl||0),0));
  const openVal      = active.reduce((s,p)=>s+(p.currentValue||0),0);

  const donutEl = document.getElementById('chartDonut');
  if (donutEl && (wins>0||losses>0||active.length>0)) {
    destroyChart('donut');
    chartInstances['donut'] = new ApexCharts(donutEl, {
      chart: { type: 'donut', height: 220, background: 'transparent', fontFamily: 'Assistant, sans-serif' },
      series: [
        totalWinPnl > 0 ? parseFloat(totalWinPnl.toFixed(2)) : 0,
        totalLossPnl > 0 ? parseFloat(totalLossPnl.toFixed(2)) : 0,
        openVal > 0 ? parseFloat(openVal.toFixed(2)) : 0,
      ].filter((v,i) => v > 0 || [totalWinPnl,totalLossPnl,openVal][i] > 0),
      labels: ['רווח 💚', 'הפסד ❌', 'פתוח 🟡'].filter((l,i) => [totalWinPnl,totalLossPnl,openVal][i] > 0),
      colors: ['#00c087', '#ef4444', '#00c4b4'],
      dataLabels: { enabled: true, style: { fontSize: '11px', fontFamily: 'IBM Plex Mono, monospace' } },
      legend: { position: 'bottom', labels: { colors: '#8fa3c0' } },
      plotOptions: { pie: { donut: { size: '60%', labels: {
        show: true,
        total: {
          show: true,
          label: 'P&L',
          color: '#8fa3c0',
          fontSize: '11px',
          formatter: () => { const pnl=port.total_pnl||0; return (pnl>=0?'+':'')+fmt$(pnl); }
        }
      }}}}
    });
    chartInstances['donut'].render();
  } else if (donutEl) {
    donutEl.innerHTML = `<div class="empty-state" style="padding:30px 0"><span class="empty-icon" style="font-size:28px">📊</span><div class="empty-text">אין נתוני זכיות/הפסדים עדיין</div></div>`;
  }

  /* Bar chart — P&L per bet */
  const barEl = document.getElementById('chartBar');
  if (barEl && allBets.length > 0) {
    destroyChart('bar');
    const labels = allBets.map(b => truncate(b.title, 25));
    const values = allBets.map(b => parseFloat((b.cashPnl||0).toFixed(2)));
    const colors = values.map(v => v >= 0 ? '#00c087' : '#ef4444');

    chartInstances['bar'] = new ApexCharts(barEl, {
      chart: {
        type: 'bar', height: Math.max(allBets.length*44,150),
        background: 'transparent', fontFamily: 'Assistant, sans-serif',
        toolbar: { show: false }
      },
      series: [{ name: 'P&L', data: values }],
      xaxis: {
        categories: labels,
        labels: { style: { colors: '#8fa3c0', fontSize: '10px', fontFamily: 'Assistant, sans-serif' } }
      },
      yaxis: {
        labels: {
          style: { colors: '#8fa3c0', fontSize: '10px', fontFamily: 'IBM Plex Mono, monospace' },
          formatter: v => '$'+v.toFixed(2)
        }
      },
      plotOptions: {
        bar: {
          horizontal: true, borderRadius: 4,
          distributed: true,
          dataLabels: { position: 'right' }
        }
      },
      dataLabels: {
        enabled: true,
        formatter: v => (v>=0?'+':'')+v.toFixed(2),
        style: { fontSize: '10px', fontFamily: 'IBM Plex Mono, monospace', colors: ['#e8edf5'] },
        offsetX: 4
      },
      colors: colors,
      grid: { borderColor: 'rgba(255,255,255,0.06)', strokeDashArray: 3 },
      tooltip: {
        theme: 'dark',
        y: { formatter: v => '$'+v.toFixed(2) }
      },
      legend: { show: false },
    });
    chartInstances['bar'].render();
  }
}

/* ══════════════════════════════════
   VIEW: INSIGHTS
══════════════════════════════════ */
function renderInsights() {
  const rp       = appData?.real_positions || {};
  const active   = rp.active || [];
  const resolved = rp.resolved || [];
  const port     = rp.portfolio || {};
  const signals  = appData?.signals || [];

  const wins    = port.wins    || 0;
  const losses  = port.losses  || 0;
  const total   = wins + losses;
  const winRate = total > 0 ? Math.round(wins/total*100) : 0;
  const pnl     = port.total_pnl || 0;
  const invested= port.total_invested || 0;
  const roi     = invested > 0 ? (pnl/invested*100) : 0;

  // Best and worst
  const allClosed = resolved.filter(r => (r.cashPnl||0) !== 0);
  const best  = allClosed.reduce((b,r) => (r.cashPnl||0) > (b?.cashPnl||0) ? r : b, null);
  const worst = allClosed.reduce((w,r) => (r.cashPnl||0) < (w?.cashPnl||Number.MAX_VALUE) ? r : w, null);

  const avgBet = (active.length+resolved.length) > 0
    ? ((active.reduce((s,p)=>s+(p.initialValue||0),0) + resolved.reduce((s,r)=>s+(r.initialValue||0),0)) / (active.length+resolved.length))
    : 0;

  // Category breakdown
  const all = appData?.all_markets || [];
  const CAT = {politics:'🗳️ פוליטיקה',economy:'💰 כלכלה',geo:'🌍 גאו',sports:'🏆 ספורט',crypto:'₿ קריפטו',tech:'🔬 טק',other:'💡 אחר'};
  const catCounts = {};
  all.forEach(m => { catCounts[m.category] = (catCounts[m.category]||0)+1; });
  const maxCat = Math.max(...Object.values(catCounts), 1);

  return `
  <!-- Key stats grid -->
  <div class="insight-grid">
    <div class="insight-card">
      <div class="insight-label">שיעור הצלחה</div>
      <div class="insight-val ${winRate>=50?'up':'down'}">${winRate}%</div>
      <div class="insight-sub">${wins} זכיות מתוך ${total} הימורים</div>
      <div class="winrate-bar"><div class="winrate-fill" style="width:${winRate}%"></div></div>
    </div>
    <div class="insight-card">
      <div class="insight-label">ROI כולל</div>
      <div class="insight-val ${roi>=0?'up':'down'}">${roi>=0?'+':''}${roi.toFixed(1)}%</div>
      <div class="insight-sub">${fmt$(pnl)} על $${invested.toFixed(2)}</div>
    </div>
    <div class="insight-card">
      <div class="insight-label">הימור ממוצע</div>
      <div class="insight-val accent">$${avgBet.toFixed(2)}</div>
      <div class="insight-sub">${active.length+resolved.length} הימורים סה"כ</div>
    </div>
    <div class="insight-card">
      <div class="insight-label">סיגנלים פעילים</div>
      <div class="insight-val accent">${signals.length}</div>
      <div class="insight-sub">${(signals.filter(s=>s.strength==='STRONG')).length} חזקים</div>
    </div>
  </div>

  <!-- Best / Worst -->
  ${best ? `
  <div class="insight-card full" style="border-color:var(--up-border);background:var(--up-bg);margin-bottom:8px">
    <div class="insight-label">🏆 ההימור הטוב ביותר</div>
    <div class="insight-val up">+${fmt$(best.cashPnl)}</div>
    <div class="insight-sub">${esc(truncate(best.title,70))}</div>
    <div style="margin-top:4px"><span class="badge badge-yes">${best.outcome||''}</span></div>
  </div>` : ''}

  ${worst && worst.cashPnl < 0 ? `
  <div class="insight-card full" style="border-color:var(--down-border);background:var(--down-bg);margin-bottom:12px">
    <div class="insight-label">💔 ההפסד הגדול ביותר</div>
    <div class="insight-val down">${fmt$(worst.cashPnl)}</div>
    <div class="insight-sub">${esc(truncate(worst.title,70))}</div>
    <div style="margin-top:4px"><span class="badge badge-no">${worst.outcome||''}</span></div>
  </div>` : ''}

  <!-- Active positions summary -->
  ${active.length > 0 ? `
  <div class="section">
    <div class="section-head">
      <span class="section-title">📂 פוזיציות פתוחות — מצב</span>
      <span class="section-badge">${active.length}</span>
    </div>
    ${active.map(p => {
      const pnl     = p.cashPnl || 0;
      const pnlSign = pnl >= 0 ? '+' : '';
      const pnlCls  = pnl >= 0 ? 'up' : 'down';
      const entryPct = Math.round((p.avgPrice||0)*1000)/10;
      const curPct   = Math.round((p.curPrice||0)*1000)/10;
      return `
      <div class="hist-item">
        <span class="hist-icon">${pnl>=0?'🟢':'🔴'}</span>
        <div class="hist-body">
          <div class="hist-title">${esc(truncate(p.title,60))}</div>
          <div class="hist-meta">
            <span>כניסה ${entryPct}%</span>
            <span>→ נוכחי ${curPct}%</span>
          </div>
        </div>
        <div class="hist-right">
          <div class="hist-pnl ${pnlCls}">${pnlSign}$${Math.abs(pnl).toFixed(2)}</div>
          <div class="hist-pct">${pnlSign}${(p.percentPnl||0).toFixed(1)}%</div>
        </div>
      </div>`;
    }).join('')}
  </div>` : ''}

  <!-- Category breakdown -->
  ${Object.keys(catCounts).length > 0 ? `
  <div class="section">
    <div class="section-head"><span class="section-title">📊 התפלגות שוק לפי קטגוריה</span></div>
    <div class="chart-card" style="padding:10px 12px">
      ${Object.entries(CAT).filter(([k])=>catCounts[k]>0).map(([k,label]) => {
        const n = catCounts[k]||0;
        const pct = Math.round(n/maxCat*100);
        return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
          <span style="font-size:11px;color:var(--t2);min-width:90px;text-align:right">${label}</span>
          <div style="flex:1;height:6px;border-radius:99px;background:var(--border-strong);overflow:hidden">
            <div style="width:${pct}%;height:100%;border-radius:99px;background:var(--accent)"></div>
          </div>
          <span style="font-family:var(--mono);font-size:11px;font-weight:600;color:var(--t1);min-width:24px;text-align:left">${n}</span>
        </div>`;
      }).join('')}
    </div>
  </div>` : ''}

  <!-- Signals list -->
  ${signals.length > 0 ? `
  <div class="section">
    <div class="section-head">
      <span class="section-title">📡 סיגנלים</span>
      <span class="section-badge">${signals.length}</span>
    </div>
    ${signals.slice(0,5).map(s => {
      const strong = s.strength==='STRONG';
      return `
      <div class="hist-item" style="align-items:center">
        <span style="font-size:18px">${strong?'🔴':'🟡'}</span>
        <div class="hist-body">
          <div class="hist-title" style="font-size:12px">${esc(truncate(s.question||s.market_title||'',60))}</div>
          <div class="hist-meta"><span>${s.type||''}</span><span>${s.days_left!=null?s.days_left+'d':'—'}</span></div>
        </div>
        <div class="hist-right">
          <span class="badge ${strong?'badge-loss':'badge-neutral'}" style="font-size:9px">${s.strength}</span>
        </div>
      </div>`;
    }).join('')}
  </div>` : ''}
  `;
}

/* ─── helper ─── */
function switchView(view) {
  activeView = view;
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.view === view);
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
  renderView();
}

/* ─── Navigation ─── */
document.getElementById('bottomNav').addEventListener('click', e => {
  const item = e.target.closest('.nav-item');
  if (!item || !item.dataset.view) return;
  switchView(item.dataset.view);
});

document.getElementById('refreshBtn').addEventListener('click', () => {
  const btn = document.getElementById('refreshBtn');
  btn.style.opacity = '0.5';
  loadData().finally(() => { btn.style.opacity = ''; });
});

/* ─── Init ─── */
loadData();
setInterval(() => loadData(), REFRESH_MS);
</script>
</body>
</html>
