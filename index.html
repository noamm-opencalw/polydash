<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>PolyDash — Prediction Market Trader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.45.2/dist/apexcharts.min.js"></script>
  <style>
    :root {
      --bg:        #070B14;
      --surface:   #0E1524;
      --card:      #141D2E;
      --card2:     #1A2540;
      --border:    rgba(99,119,183,0.15);
      --border2:   rgba(99,119,183,0.28);
      --green:     #00D9A3;
      --green-dim: rgba(0,217,163,0.10);
      --red:       #FF4D6A;
      --red-dim:   rgba(255,77,106,0.10);
      --blue:      #4F8EFF;
      --blue-dim:  rgba(79,142,255,0.10);
      --yellow:    #FFB830;
      --yellow-dim:rgba(255,184,48,0.10);
      --purple:    #9B7FFF;
      --t1:        #E8EDF5;
      --t2:        #8A9BC0;
      --t3:        #3D4F72;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Inter', sans-serif;
      --r:         10px;
      --r-lg:      16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--t1);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 58px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--blue);
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
    .topbar-mid { flex: 1; }
    .live-badge {
      background: var(--green-dim);
      border: 1px solid rgba(0,217,163,0.3);
      color: var(--green);
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.08em;
    }
    .updated-ts {
      color: var(--t3);
      font-family: var(--mono);
      font-size: 11px;
      margin-right: 12px;
    }

    /* ── LAYOUT ── */
    .container { max-width: 1280px; margin: 0 auto; padding: 24px 20px; }

    /* ── HERO STATS ── */
    .hero-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--border2); }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card.green::before  { background: linear-gradient(90deg, transparent, var(--green), transparent); }
    .stat-card.blue::before   { background: linear-gradient(90deg, transparent, var(--blue), transparent); }
    .stat-card.yellow::before { background: linear-gradient(90deg, transparent, var(--yellow), transparent); }
    .stat-card.red::before    { background: linear-gradient(90deg, transparent, var(--red), transparent); }
    .stat-label { font-size: 11px; color: var(--t3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
    .stat-value { font-family: var(--mono); font-size: 28px; font-weight: 600; color: var(--t1); line-height: 1; }
    .stat-value.green  { color: var(--green); }
    .stat-value.red    { color: var(--red); }
    .stat-value.blue   { color: var(--blue); }
    .stat-value.yellow { color: var(--yellow); }
    .stat-sub { font-size: 12px; color: var(--t2); margin-top: 8px; }
    .stat-icon { position: absolute; top: 18px; left: 18px; font-size: 22px; opacity: 0.3; }

    /* ── SECTION HEADER ── */
    .section { margin-bottom: 28px; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--t2);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .section-line { flex: 1; height: 1px; background: var(--border); }
    .section-badge {
      font-family: var(--mono);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--card2);
      color: var(--t3);
    }

    /* ── POSITIONS TABLE ── */
    .positions-grid {
      display: grid;
      gap: 8px;
    }
    .position-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 40px 1fr 100px 90px 90px 80px;
      align-items: center;
      gap: 12px;
      transition: background 0.15s, border-color 0.15s;
    }
    .position-row:hover { background: var(--card2); border-color: var(--border2); }
    .pos-icon { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; background: var(--card2); }
    .pos-title { font-size: 13px; font-weight: 500; color: var(--t1); line-height: 1.4; }
    .pos-meta { font-size: 11px; color: var(--t3); margin-top: 3px; font-family: var(--mono); }
    .pos-price {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 600;
      text-align: center;
    }
    .pos-value {
      font-family: var(--mono);
      font-size: 14px;
      text-align: center;
      color: var(--t2);
    }
    .pos-pnl {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      text-align: center;
    }
    .pos-pnl.pos { color: var(--green); }
    .pos-pnl.neg { color: var(--red); }
    .pos-badge {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0.04em;
      font-family: var(--mono);
    }
    .badge-yes { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,217,163,0.2); }
    .badge-no  { background: var(--red-dim);   color: var(--red);   border: 1px solid rgba(255,77,106,0.2); }

    /* ── PROGRESS BAR ── */
    .progress-wrap { margin-top: 6px; }
    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
    .progress-fill.green { background: var(--green); }
    .progress-fill.red   { background: var(--red); }
    .progress-fill.blue  { background: var(--blue); }

    /* ── MARKETS GRID ── */
    .markets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
    }
    .market-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.15s, transform 0.15s;
      cursor: pointer;
    }
    .market-card:hover { border-color: var(--border2); transform: translateY(-1px); }
    .market-card-top { display: flex; gap: 10px; align-items: flex-start; }
    .market-thumb { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--card2); }
    .market-q { font-size: 12px; color: var(--t1); line-height: 1.5; font-weight: 500; }
    .market-stats { display: flex; align-items: center; gap: 8px; }
    .mstat { font-family: var(--mono); font-size: 12px; color: var(--t2); }
    .yes-pill {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 6px;
    }
    .yes-pill.high { background: var(--green-dim); color: var(--green); }
    .yes-pill.mid  { background: var(--yellow-dim); color: var(--yellow); }
    .yes-pill.low  { background: var(--red-dim); color: var(--red); }
    .days-badge {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--t3);
      padding: 2px 7px;
      background: var(--card2);
      border-radius: 4px;
    }

    /* ── SIGNALS TABLE ── */
    .signal-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      border-radius: var(--r);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
      transition: border-color 0.15s;
    }
    .signal-row.strong { border-left-color: var(--red); }
    .signal-row.medium { border-left-color: var(--yellow); }
    .signal-strength {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 5px;
      min-width: 70px;
      text-align: center;
    }
    .sig-strong { background: var(--red-dim); color: var(--red); }
    .sig-medium { background: var(--yellow-dim); color: var(--yellow); }
    .signal-q { flex: 1; font-size: 13px; color: var(--t1); }
    .signal-meta { font-family: var(--mono); font-size: 12px; color: var(--t3); }
    .signal-score {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 600;
      color: var(--blue);
      min-width: 48px;
      text-align: center;
    }
    .signal-size {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--green);
      min-width: 55px;
      text-align: right;
    }

    /* ── RECOMMENDATION ── */
    .rec-card {
      background: linear-gradient(135deg, #0E1A2E, #141D2E);
      border: 1px solid rgba(79,142,255,0.3);
      border-radius: var(--r-lg);
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    .rec-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--purple), var(--blue), var(--green));
    }
    .rec-label {
      font-size: 11px;
      color: var(--blue);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-family: var(--mono);
    }
    .rec-title { font-size: 16px; font-weight: 600; color: var(--t1); line-height: 1.4; margin-bottom: 12px; }
    .rec-reasoning { font-size: 13px; color: var(--t2); line-height: 1.6; margin-bottom: 16px; }
    .rec-meta { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    .rec-chip {
      font-family: var(--mono);
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 6px;
    }
    .chip-yes   { background: var(--green-dim); color: var(--green); }
    .chip-score { background: var(--blue-dim);  color: var(--blue); }
    .chip-size  { background: var(--yellow-dim); color: var(--yellow); }

    /* ── TABS ── */
    .tabs { display: flex; gap: 2px; margin-bottom: 16px; background: var(--surface); padding: 4px; border-radius: 10px; width: fit-content; }
    .tab {
      padding: 7px 16px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      color: var(--t3);
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab:hover { color: var(--t2); }
    .tab.active { background: var(--card); color: var(--t1); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── RESOLVED TABLE ── */
    .resolved-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px 18px;
      display: grid;
      grid-template-columns: 1fr 90px 80px 80px 80px;
      gap: 12px;
      align-items: center;
      margin-bottom: 6px;
    }
    .resolved-outcome {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      text-align: center;
    }
    .outcome-win  { background: var(--green-dim); color: var(--green); }
    .outcome-loss { background: var(--red-dim);   color: var(--red); }

    /* ── EMPTY STATE ── */
    .empty { text-align: center; color: var(--t3); padding: 40px; font-size: 13px; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .hero-grid { grid-template-columns: repeat(2,1fr); }
      .position-row { grid-template-columns: 1fr 80px 70px; }
      .position-row > :nth-child(1),
      .position-row > :nth-child(4) { display: none; }
    }
    @media (max-width: 600px) {
      .hero-grid { grid-template-columns: repeat(2,1fr); }
      .markets-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    PolyDash
  </div>
  <div class="topbar-mid"></div>
  <span class="updated-ts" id="ts">—</span>
  <span class="live-badge">LIVE</span>
</div>

<div class="container">

  <!-- HERO STATS -->
  <div class="hero-grid" id="hero-stats">
    <div class="stat-card blue">
      <div class="stat-icon">💼</div>
      <div class="stat-label">Portfolio Value</div>
      <div class="stat-value blue" id="s-total">—</div>
      <div class="stat-sub" id="s-cash">cash: —</div>
    </div>
    <div class="stat-card" id="sc-pnl">
      <div class="stat-icon">📈</div>
      <div class="stat-label">All-Time P&amp;L</div>
      <div class="stat-value" id="s-pnl">—</div>
      <div class="stat-sub" id="s-pnl-sub">—</div>
    </div>
    <div class="stat-card green">
      <div class="stat-icon">🎯</div>
      <div class="stat-label">Win Rate</div>
      <div class="stat-value green" id="s-wr">—</div>
      <div class="stat-sub" id="s-wr-sub">—</div>
    </div>
    <div class="stat-card yellow">
      <div class="stat-icon">⚡</div>
      <div class="stat-label">Active Positions</div>
      <div class="stat-value yellow" id="s-active">—</div>
      <div class="stat-sub" id="s-active-sub">—</div>
    </div>
  </div>

  <!-- RECOMMENDATION -->
  <div class="section" id="sec-rec" style="display:none">
    <div class="section-header">
      <div class="section-title">🤖 המלצת AI</div>
      <div class="section-line"></div>
    </div>
    <div class="rec-card">
      <div class="rec-label">RECOMMENDED TRADE</div>
      <div class="rec-title" id="rec-title">—</div>
      <div class="rec-reasoning" id="rec-reasoning">—</div>
      <div class="rec-meta">
        <span class="rec-chip chip-yes" id="rec-yes">—</span>
        <span class="rec-chip chip-score" id="rec-score">—</span>
        <span class="rec-chip chip-size" id="rec-size">—</span>
        <a id="rec-link" href="#" target="_blank" style="color:var(--blue);font-size:12px;text-decoration:none;font-family:var(--mono)">→ Polymarket</a>
      </div>
    </div>
  </div>

  <!-- TABS: POSITIONS / SIGNALS / MARKETS -->
  <div class="tabs">
    <div class="tab active" onclick="showTab('positions')">פוזיציות</div>
    <div class="tab" onclick="showTab('signals')">Signals</div>
    <div class="tab" onclick="showTab('markets')">שווקים חמים</div>
    <div class="tab" onclick="showTab('history')">היסטוריה</div>
  </div>

  <!-- TAB: POSITIONS -->
  <div class="tab-content active" id="tab-positions">
    <div class="section">
      <div class="section-header">
        <div class="section-title">פוזיציות פתוחות</div>
        <div class="section-line"></div>
        <div class="section-badge" id="pos-count">0</div>
      </div>
      <div class="positions-grid" id="positions-list">
        <div class="empty">טוען...</div>
      </div>
    </div>
  </div>

  <!-- TAB: SIGNALS -->
  <div class="tab-content" id="tab-signals">
    <div class="section">
      <div class="section-header">
        <div class="section-title">Signals אחרונים</div>
        <div class="section-line"></div>
        <div class="section-badge" id="sig-count">0</div>
      </div>
      <div id="signals-list"><div class="empty">אין signals</div></div>
    </div>
  </div>

  <!-- TAB: MARKETS -->
  <div class="tab-content" id="tab-markets">
    <div class="section">
      <div class="section-header">
        <div class="section-title">שווקים חמים</div>
        <div class="section-line"></div>
      </div>
      <div class="markets-grid" id="markets-list"><div class="empty">טוען...</div></div>
    </div>
  </div>

  <!-- TAB: HISTORY -->
  <div class="tab-content" id="tab-history">
    <div class="section">
      <div class="section-header">
        <div class="section-title">עסקאות סגורות</div>
        <div class="section-line"></div>
        <div class="section-badge" id="hist-count">0</div>
      </div>
      <div id="history-list"><div class="empty">אין נתונים</div></div>
    </div>
  </div>

</div><!-- /container -->

<script>
const fmt = (n, d=2) => n != null ? Number(n).toFixed(d) : '—';
const fmtM = n => {
  if (n == null) return '—';
  const abs = Math.abs(n);
  if (abs >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (abs >= 1e3) return (n/1e3).toFixed(0)+'K';
  return Number(n).toFixed(0);
};

function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const names = ['positions','signals','markets','history'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-'+name)?.classList.add('active');
}

function pillClass(pct) {
  if (pct >= 0.75) return 'high';
  if (pct >= 0.35) return 'mid';
  return 'low';
}

async function load() {
  let d;
  try { d = await fetch('data.json?t='+Date.now()).then(r=>r.json()); }
  catch(e) { return; }

  // timestamp
  if (d.updated_at) {
    const dt = new Date(d.updated_at);
    document.getElementById('ts').textContent = dt.toLocaleString('he-IL',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'});
  }

  // portfolio stats
  const port = d.portfolio || {};
  const posit = d.real_positions || {};
  const activePos = posit.active || [];
  const portData = posit.portfolio || {};
  const totalPnl = portData.totalPnl || port.total_pnl || 0;
  const totalInv  = portData.totalInvestment || port.total_invested || 0;
  const curVal    = portData.currentValue || 0;
  const cash      = parseFloat(localStorage.getItem('wallet_cash') || '113.06');
  const totalCap  = cash + activePos.reduce((s,p)=>s+parseFloat(p.currentValue||0),0);

  document.getElementById('s-total').textContent = '$' + fmt(totalCap);
  document.getElementById('s-cash').textContent  = 'cash: $' + fmt(cash) + ' | positions: $' + fmt(curVal);

  const pnlEl = document.getElementById('s-pnl');
  const pnlSub = document.getElementById('s-pnl-sub');
  const scPnl = document.getElementById('sc-pnl');
  pnlEl.textContent = (totalPnl >= 0 ? '+' : '') + '$' + fmt(totalPnl);
  pnlEl.className = 'stat-value ' + (totalPnl >= 0 ? 'green' : 'red');
  scPnl.className = 'stat-card ' + (totalPnl >= 0 ? 'green' : 'red');
  const pnlPct = totalInv > 0 ? (totalPnl/totalInv*100).toFixed(1) : '0';
  pnlSub.textContent = pnlPct + '% on invested';

  const wins = port.wins || 0, losses = port.losses || 0;
  const total = wins + losses;
  const wr = total > 0 ? (wins/total*100).toFixed(0) : '—';
  document.getElementById('s-wr').textContent = wr + '%';
  document.getElementById('s-wr-sub').textContent = `${wins}W / ${losses}L of ${total} trades`;

  document.getElementById('s-active').textContent = activePos.length;
  document.getElementById('s-active-sub').textContent = '$' + fmt(curVal) + ' current value';

  // POSITIONS
  document.getElementById('pos-count').textContent = activePos.length;
  const posEl = document.getElementById('positions-list');
  if (!activePos.length) { posEl.innerHTML = '<div class="empty">אין פוזיציות פתוחות</div>'; }
  else {
    posEl.innerHTML = activePos.map(p => {
      const pnl = parseFloat(p.cashPnl || 0);
      const pnlPct = parseFloat(p.percentPnl || 0);
      const curP = parseFloat(p.curPrice || 0);
      const side = (p.outcome||'Yes').toLowerCase();
      const badgeCls = side.includes('no') ? 'badge-no' : 'badge-yes';
      const progW = Math.round(curP * 100);
      const progCls = curP >= 0.5 ? 'green' : (curP >= 0.2 ? 'blue' : 'red');
      const pnlCls = pnl >= 0 ? 'pos' : 'neg';
      const icon = p.icon || '';
      return `<div class="position-row">
        <div>${icon ? `<img class="pos-icon" src="${icon}" onerror="this.style.display='none'"/>` : ''}</div>
        <div>
          <div class="pos-title">${p.title||p.slug||'—'}</div>
          <div class="pos-meta">avg ${fmt(p.avgPrice)} · ${p.daysLeft||0}d · ${p.endDate||''}</div>
          <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill ${progCls}" style="width:${progW}%"></div></div></div>
        </div>
        <div class="pos-price" style="color:var(--${progCls})">${fmt(curP*100,1)}%</div>
        <div class="pos-value">$${fmt(p.currentValue)}</div>
        <div class="pos-pnl ${pnlCls}">${pnl>=0?'+':''}$${fmt(pnl)}<br><span style="font-size:11px">${pnlPct>=0?'+':''}${fmt(pnlPct,1)}%</span></div>
        <div><span class="pos-badge ${badgeCls}">${p.outcome||'Yes'}</span></div>
      </div>`;
    }).join('');
  }

  // SIGNALS
  const sigs = d.signals || [];
  document.getElementById('sig-count').textContent = sigs.length;
  const sigEl = document.getElementById('signals-list');
  if (!sigs.length) { sigEl.innerHTML = '<div class="empty">אין signals</div>'; }
  else {
    sigEl.innerHTML = sigs.slice(0,15).map(s => {
      const str = (s.strength||'MEDIUM').toUpperCase();
      const cls = str === 'STRONG' ? 'strong' : 'medium';
      const chipCls = str === 'STRONG' ? 'sig-strong' : 'sig-medium';
      return `<div class="signal-row ${cls}">
        <span class="signal-strength ${chipCls}">${str}</span>
        <div class="signal-q">${s.question||s.slug||'—'}</div>
        <span class="signal-meta">Yes ${fmt((s.yes_price||0)*100,0)}% · ${s.days_left||0}d</span>
        <span class="signal-score">${Math.round(s.score||0)}</span>
        <span class="signal-size">$${fmt(s.size_usd||0,1)}</span>
      </div>`;
    }).join('');
  }

  // MARKETS (hot)
  const hot = d.hot || d.all_markets || [];
  const mEl = document.getElementById('markets-list');
  if (!hot.length) { mEl.innerHTML = '<div class="empty">אין נתונים</div>'; }
  else {
    mEl.innerHTML = hot.slice(0,12).map(m => {
      const yp = parseFloat(m.yes_pct || m.yes_price || 0);
      const ypPct = yp > 1 ? yp : yp * 100;
      const cls = pillClass(yp > 1 ? yp/100 : yp);
      const liq = m.liquidity || m.liq || 0;
      const vol = m.volume24h || m.volume24hr || m.vol || 0;
      const img = m.icon || m.image || '';
      const link = m.link || m.url || '#';
      return `<div class="market-card" onclick="window.open('${link}','_blank')">
        <div class="market-card-top">
          ${img ? `<img class="market-thumb" src="${img}" onerror="this.style.display='none'"/>` : ''}
          <div class="market-q">${m.question||m.title||'—'}</div>
        </div>
        <div class="market-stats">
          <span class="yes-pill ${cls}">${fmt(ypPct,0)}%</span>
          <span class="mstat">💧$${fmtM(liq)}</span>
          <span class="mstat">📊$${fmtM(vol)}</span>
          <span class="days-badge">${m.days_left||m.days||'?'}d</span>
        </div>
      </div>`;
    }).join('');
  }

  // HISTORY
  const resolved = posit.resolved || d.resolved_bets || [];
  document.getElementById('hist-count').textContent = resolved.length;
  const hEl = document.getElementById('history-list');
  if (!resolved.length) { hEl.innerHTML = '<div class="empty">אין עסקאות סגורות</div>'; }
  else {
    hEl.innerHTML = resolved.slice(0,20).map(r => {
      const pnl = parseFloat(r.cashPnl || r.pnl || 0);
      const outcome = pnl > 0 ? 'WIN' : 'LOSS';
      const outCls = pnl > 0 ? 'outcome-win' : 'outcome-loss';
      return `<div class="resolved-row">
        <div>
          <div class="pos-title" style="font-size:12px">${r.title||r.question||r.slug||'—'}</div>
          <div class="pos-meta">${r.outcome||''} · avg ${fmt(r.avgPrice||r.entry_price,3)}</div>
        </div>
        <span class="resolved-outcome ${outCls}">${outcome}</span>
        <div class="mstat" style="text-align:center">$${fmt(r.initialValue||r.size||0)}</div>
        <div class="mstat" style="text-align:center">$${fmt(r.currentValue||r.exit_value||0)}</div>
        <div class="pos-pnl ${pnl>=0?'pos':'neg'}" style="text-align:right">${pnl>=0?'+':''}$${fmt(pnl)}</div>
      </div>`;
    }).join('');
  }

  // RECOMMENDATION
  const rec = d.recommendation;
  if (rec && rec.title) {
    document.getElementById('sec-rec').style.display = '';
    document.getElementById('rec-title').textContent = rec.title;
    document.getElementById('rec-reasoning').textContent = rec.reasoning || '';
    document.getElementById('rec-yes').textContent = 'Yes ' + fmt((rec.yes_pct||0)*100,0) + '%';
    document.getElementById('rec-score').textContent = 'Score ' + Math.round(rec.score||0);
    document.getElementById('rec-size').textContent = '$' + fmt(rec.size_usd||0,1);
    const link = document.getElementById('rec-link');
    if (rec.link) link.href = rec.link;
  }
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
